<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Humanitarian Monthly Briefer April 2026</title>
    <style>
                /* ════════════════════════════════
        VARIABLES & RESET
        ════════════════════════════════ */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Barlow+Condensed:wght@600;700;800&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Padauk:wght@400;700&display=swap');
        :root {
        --navy:     #1F3864;
        --blue:     #000071;
        --light:    #D6E4F0;
        --white:    #FFFFFF;
        --offwhite: #F4F6F8;
        --text:     #1a1714;
        --muted:    #6b7068;
        --accent:   #C8A84B;
        --dark:     #1a1714;
        }
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        /* ── BACK LINK ── */
        .briefer-back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'League Spartan', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #6b7f99;
            margin: 5rem 0 2rem 30rem;
            transition: color 0.2s;
            text-decoration: none;
        }

        .briefer-back-link:hover { color: #1F3864; }

        .briefer-container{
            width: 100vw;
        }
        .briefer-img{
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        img{
            width: 50%;
            height: 100vh;
            margin: 10px 0;
        }

        /* ════════════════════════════════
        BUTTONS
        ════════════════════════════════ */

        .btn-position{
            width: 50%;
            display: flex;
            justify-content: end;
            align-items: end;

        }
        .btn {
            background-color: var(--blue);
            display: inline-block;
            padding: 0.8rem 1.75rem;
            margin-bottom: 3rem;
            border-radius: 2px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.25s;
            cursor: pointer;
            border: none;
            font-family: 'Inter', sans-serif;
            
        }

        .btn-blue {
            background: var(--blue);
            color: var(--white);
        }
        .btn-blue:hover {
            background: var(--navy);
            transform: translateY(-2px);
            color: var(--white);
        }

        .btn-outline-dark {
            background: transparent;
            color: var(--navy);
            border: 1.5px solid var(--navy);
        }
        .btn-outline-dark:hover {
            background: var(--navy);
            color: var(--white);
        }


    </style>
</head>
<body>
    
    <section class="briefer-container">
        <a href="../../../briefer.html" class="briefer-back-link">← Back to All Briefers</a>
        <div class="briefer-img">
            <img src="./Feb_Monthly_Briefer_front_page_2026.webp" alt="">
            <img src="./Feb_monthly_briefer_second_page_2026.webp" alt="">
            
            <div class="btn-position">
                <a href="../../../briefer.html" class="btn btn-blue">Back to All Briefers</a>
            </div>
        </div>

        
    </section>

    
</body>
</html>
